<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASCENDR — P1 High-Fidelity Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#4F46E5; --secondary:#2563EB; --accent:#10B981;
  --warning:#F59E0B; --danger:#EF4444;
  --bg:#F8FAFC; --card:#FFFFFF; --text:#0F172A; --text-2:#64748B; --border:#E2E8F0;
  --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:24px;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --shadow-lg:0 10px 30px rgba(15,23,42,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#EEF1F6;color:var(--text);-webkit-font-smoothing:antialiased}
.app-chrome{position:sticky;top:0;z-index:50;background:#0F172A;color:#fff;display:flex;align-items:center;gap:16px;padding:12px 20px;flex-wrap:wrap}
.app-chrome .brand{font-weight:900;letter-spacing:.5px;font-size:18px}
.app-chrome .brand span{color:#a5b4fc}
.app-chrome .sub{color:#94a3b8;font-size:12px;font-weight:500}
.controls{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.seg{display:flex;background:#1E293B;border-radius:999px;padding:3px}
.seg button{border:0;background:transparent;color:#94a3b8;font-weight:600;font-size:13px;padding:6px 14px;border-radius:999px;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--primary);color:#fff}
.screen-nav{display:flex;gap:6px;flex-wrap:wrap;padding:12px 20px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:49px;z-index:40}
.screen-nav button{border:1px solid var(--border);background:#fff;color:var(--text-2);font-weight:600;font-size:13px;padding:7px 13px;border-radius:999px;cursor:pointer;font-family:inherit}
.screen-nav button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.stage{padding:28px 20px 60px;display:flex;justify-content:center}
.device{transition:width .25s ease}
.device.desktop{width:100%;max-width:1280px}
.device.mobile{width:390px;max-width:100%}
.frame{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-lg)}
.device.mobile .frame{border-radius:32px;border:8px solid #0F172A}
.screen{display:none}
.screen.on{display:block}
/* generic */
.btn{display:inline-flex;align-items:center;gap:8px;border:0;border-radius:var(--r-sm);font-family:inherit;font-weight:600;font-size:14px;padding:11px 18px;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-ghost{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-block{width:100%;justify-content:center}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px}
.pill-accent{background:#ecfdf5;color:#047857}
.pill-primary{background:#eef2ff;color:#4338ca}
.pill-warn{background:#fffbeb;color:#b45309}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow)}
.muted{color:var(--text-2)}
.avatar{width:36px;height:36px;border-radius:999px;background:linear-gradient(135deg,#6366f1,#2563eb);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto}
.h-sec{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-2)}
/* ---- App shell (desktop) ---- */
.shell{display:grid;grid-template-columns:240px 1fr;min-height:680px}
.device.mobile .shell{grid-template-columns:1fr;min-height:720px}
.sidebar{background:#fff;border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column;gap:4px}
.device.mobile .sidebar{display:none}
.side-brand{font-weight:900;font-size:20px;padding:6px 10px 18px}
.side-brand span{color:var(--primary)}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-sm);color:var(--text-2);font-weight:600;font-size:14px;cursor:pointer}
.nav-item .ic{width:18px;text-align:center}
.nav-item.on{background:#eef2ff;color:var(--primary)}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 22px;background:#fff;border-bottom:1px solid var(--border)}
.device.mobile .topbar{padding:14px 16px}
.search{flex:1;max-width:420px;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:9px 14px;color:var(--text-2);font-size:13px}
.topbar .sp{margin-left:auto}
.iconbtn{position:relative;width:38px;height:38px;border-radius:999px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.dot{position:absolute;top:6px;right:7px;width:8px;height:8px;border-radius:999px;background:var(--danger);border:2px solid #fff}
.content{padding:22px;overflow:auto}
.device.mobile .content{padding:16px 16px 86px}
.mobnav{display:none}
.device.mobile .mobnav{display:flex;position:sticky;bottom:0;background:#fff;border-top:1px solid var(--border);justify-content:space-around;padding:8px 6px}
.mobnav button{border:0;background:transparent;font-family:inherit;font-size:11px;font-weight:600;color:var(--text-2);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.mobnav button .ic{font-size:18px}
.mobnav button.on{color:var(--primary)}
.fab{width:46px;height:46px;border-radius:999px;background:var(--primary);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;margin-top:-18px;box-shadow:var(--shadow-lg)}
.grid{display:grid;gap:16px}
.streak{background:linear-gradient(120deg,#4F46E5,#2563EB);color:#fff;border-radius:var(--r-md);padding:18px 20px;display:flex;align-items:center;gap:16px}
.streak .flame{font-size:30px}
.statline{display:flex;gap:18px;flex-wrap:wrap}
.stat{flex:1;min-width:120px}
.stat .n{font-size:24px;font-weight:800}
.progress{height:8px;background:var(--border);border-radius:999px;overflow:hidden}
.progress > i{display:block;height:100%;background:var(--accent)}
.tabbar{display:flex;gap:4px;border-bottom:1px solid var(--border);overflow:auto}
.tabbar button{border:0;background:transparent;font-family:inherit;font-weight:600;font-size:14px;color:var(--text-2);padding:12px 14px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
.tabbar button.on{color:var(--primary);border-bottom-color:var(--primary)}
.note{font-size:12px;color:var(--text-2);background:#fff;border:1px dashed var(--border);border-radius:var(--r-sm);padding:10px 12px}
.legend{max-width:1280px;margin:0 auto 18px;font-size:12px;color:#64748b}
@media(max-width:520px){.stage{padding:16px 8px 50px}}
</style>
</head>
<body>
<div class="app-chrome">
  <div class="brand">ASCEND<span>R</span></div>
  <div class="sub">P1 High-Fidelity Prototype · Stages 1–4 design system</div>
  <div class="controls">
    <div class="seg" id="deviceSeg">
      <button data-d="desktop" class="on">Desktop</button>

  <button data-s="home">2 · Home</button>

<div class="legend">Colors, type (Inter), 8px grid and components are driven by the ASCENDR Stage 1 design tokens. Toggle Desktop / Mobile to see the responsive treatment of each screen.</div>
<div class="stage">
  <div class="device desktop" id="device">
    <div class="frame">
      <!-- SCREENS INJECTED BELOW -->

    </div>
  </div>

<script>
const screens = {};

/* ===== Shared shell builder (Home, Community, AI all use the app shell) ===== */
function shell(active, contentHTML, mobActive){
  const nav=[['home','◳','Home'],['comm','◎','Communities'],['learn','▦','Learn'],['live','◉','Live'],['net','⚇','Networking'],['jobs','▤','Jobs'],['ai','✦','AI'],['profile','◍','Profile']];
  const side=nav.map(n=>`<div class="nav-item ${n[0]===active?'on':''}"><span class="ic">${n[1]}</span>${n[2]}</div>`).join('');
  const mob=[['home','◳','Home'],['comm','◎','Communities'],['add','＋',''],['live','◉','Live'],['profile','◍','Profile']];
  const mobHTML=mob.map(m=>m[0]==='add'?`<button><span class="fab">＋</span></button>`:`<button class="${m[0]===mobActive?'on':''}"><span class="ic">${m[1]}</span>${m[2]}</button>`).join('');
  return `<div class="shell">
    <aside class="sidebar"><div class="side-brand">ASCEND<span>R</span></div>${side}</aside>
    <div class="main">
      <div class="topbar">
        <div class="iconbtn">☰</div>
        <div class="search">Search people, communities, courses…</div>
        <div class="sp"></div>
        <div class="iconbtn">✦</div>
        <div class="iconbtn">🔔<span class="dot"></span></div>
        <div class="avatar">MM</div>
      </div>
      <div class="content">${contentHTML}</div>
      <div class="mobnav">${mobHTML}</div>
    </div>
  </div>`;
}

/* ===== render + controls ===== */
const elScreens=document.getElementById('screens');
const device=document.getElementById('device');
let cur='onboarding';
function render(){elScreens.innerHTML=`<div class="screen on">${screens[cur]}</div>`;}
render();
document.getElementById('screenNav').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;cur=b.dataset.s;document.querySelectorAll('#screenNav button').forEach(x=>x.classList.toggle('on',x===b));render();});
document.getElementById('deviceSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;device.className='device '+b.dataset.d;document.querySelectorAll('#deviceSeg button').forEach(x=>x.classList.toggle('on',x===b));applyResponsive();});
function applyResponsive(){
  const mobile=device.classList.contains('mobile');
  const collapse=(id)=>{const g=document.getElementById(id);if(g)g.style.gridTemplateColumns=mobile?'1fr':g.dataset.cols||g.style.gridTemplateColumns;};
  // store + collapse multi-column grids on mobile
  ['homeGrid','homeRail','commGrid','commRail','liveGrid','aiGrid','aiRail','ob-grid'].forEach(()=>{});
  document.querySelectorAll('#homeGrid,#commGrid,#liveGrid,#aiGrid').forEach(g=>{if(!g.dataset.cols)g.dataset.cols=g.style.gridTemplateColumns;g.style.gridTemplateColumns=mobile?'1fr':g.dataset.cols;});
  document.querySelectorAll('#commChannels,#commRail,#aiLeft,#aiRail,#liveRail').forEach(el=>{el.style.display=mobile?'none':'';});
  const ob=document.querySelector('.ob-grid');if(ob){ob.style.gridTemplateColumns=mobile?'1fr':'1.05fr .95fr';}
}
const _r=render;render=function(){_r();applyResponsive();};render();
